<!-- ── EXPORT REPORT ── -->
<section id="section-export" class="content-section">
    <div class="card">
        <div class="card-header-row">
            <div>
                <h2 class="card-title"><i class="bi bi-file-earmark-excel"></i> Export Daily Time Report</h2>
                <p class="card-sub">Select a month and download your time entries as an Excel file</p>
            </div>
        </div>
        <div class="form-group" style="margin-bottom: 24px;">
            <label class="form-label">Select Month & Year</label>
            <input type="month" id="exportMonth" class="form-input" style="width: 100%; max-width: 200px;" title="Select a month to export">
        </div>
        <div class="export-preview-container">
            <h3 style="margin-bottom:12px; font-weight: 600; color: var(--text);">Preview</h3>
            <div id="exportPreviewTable" class="export-preview-table" style="background: var(--bg-2); border: 1px solid var(--border); border-radius: 8px; padding: 16px;"></div>
        </div>
    </div>
    <div class="actions-bar">
        <button class="btn btn-primary" onclick="window.calculator?.confirmExportToExcel()"><i class="bi bi-download"></i> Download Excel</button>
    </div>
</section>
