<!-- ── TIME ENTRIES ── -->
<section id="section-entries" class="content-section">
    <div class="card">
        <div class="card-header-row">
            <h2 class="card-title">All Time Entries</h2>
            <div class="table-actions">
                <button type="button" id="duplicateBtn" class="btn btn-sm btn-outline">
                    <i class="bi bi-copy"></i> Duplicate Last
                </button>
                <span class="total-badge">Total: <strong id="totalHours">0.00</strong> hrs</span>
            </div>
        </div>

        <!-- Filter Section -->
        <div style="padding: 16px; border-bottom: 1px solid var(--border); background: var(--bg-secondary);">
            <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap;">
                <div style="display: flex; gap: 8px; align-items: center;">
                    <label style="font-size: 13px; font-weight: 500; color: var(--text-2);">Filter:</label>
                    <input type="date" id="filterStartDate" class="form-input" style="font-size: 13px; padding: 6px 8px;">
                    <span style="color: var(--text-3);">to</span>
                    <input type="date" id="filterEndDate" class="form-input" style="font-size: 13px; padding: 6px 8px;">
                </div>
                <button class="btn btn-sm btn-outline" id="clearFilterBtn" style="font-size: 12px;">
                    <i class="bi bi-x-circle"></i> Clear Filter
                </button>
                <span style="font-size: 12px; color: var(--text-3); margin-left: auto;" id="filterInfo">Showing all entries</span>
            </div>
        </div>
        <div class="table-wrapper">
            <table class="entries-table" id="hoursTable">
                <thead>
                    <tr><th>#</th><th>Date</th><th>Time In</th><th>Time Out</th><th>Break</th><th>Total Hrs</th><th>Net Hrs</th><th>Action</th></tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row"><td colspan="8"><i class="bi bi-inbox"></i> No entries yet.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="actions-bar">
        <button id="exportBtn" class="btn btn-primary"><i class="bi bi-file-earmark-excel"></i> Export to Excel</button>
        <button id="clearBtn" class="btn btn-danger"><i class="bi bi-trash3"></i> Clear All</button>
    </div>
</section>
